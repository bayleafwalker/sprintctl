name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout sprintctl
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run full test suite
        run: uv run pytest -q

  kctl-contract:
    name: Kctl Producer Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sprintctl
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run contract tests consumed by kctl
        run: >-
          uv run pytest -q
          tests/test_maintain.py
          tests/test_event_payload_contracts.py
          tests/test_knowledge.py
          tests/test_backlog_seed.py
